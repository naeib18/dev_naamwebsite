<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aanvraag Nieuwsbrief</title>
    <link rel="stylesheet" href="stle.css">
</head>

<body>

    <div class="form-container">
        <h2>Aanvraag nieuwsbrief</h2>

        <form action="/action_page.php" method="POST">
            <div class="form-group">
                <label for="voornaam">Voornaam</label>
                <input type="text" id="voornaam" name="voornaam" placeholder="Uw voornaam" required>
            </div>

            <div class="form-group">
                <label for="tussenvoegsel">Tussenvoegsel</label>
                <input type="text" id="tussenvoegsel" name="tussenvoegsel" placeholder="van, de, etc. (optioneel)">
            </div>

            <div class="form-group">
                <label for="achternaam">Achternaam</label>
                <input type="text" id="achternaam" name="achternaam" placeholder="Uw achternaam" required>
            </div>

            <div class="form-group">
                <label for="geboortedatum">Geboortedatum</label>
                <input type="date" id="geboortedatum" name="geboortedatum" required>
            </div>

            <div class="form-row">
                <div class="form-group flex-grow">
                    <label for="straatnaam">Straatnaam</label>
                    <input type="text" id="straatnaam" name="straatnaam" placeholder="Straatnaam" required>
                </div>

                <div class="form-group">
                    <label for="nummer">Nummer</label>
                    <input type="text" id="nummer" name="nummer" placeholder="123" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="postcode">Postcode</label>
                    <input type="text" id="postcode" name="postcode" placeholder="1234 AB" required>
                </div>

                <div class="form-group flex-grow">
                    <label for="woonplaats">Woonplaats</label>
                    <input type="text" id="woonplaats" name="woonplaats" placeholder="Woonplaats" required>
                </div>
            </div>

            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="akkoord" name="akkoord" required>
                    <span>Ik ga akkoord met de voorwaarden en wil de nieuwsbrief ontvangen</span>
                </label>
            </div>

            <button type="submit" class="submit-btn">Verzenden</button>
        </form>
    </div>

</body>

</html>
